name: CI

on:
  push:
    branches: [main, prd-*]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov

      - name: Lint with ruff
        run: ruff check cobuilder/ tests/ --ignore E501,W293,W291

      - name: Check formatting
        run: ruff format --check cobuilder/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install pytest pytest-cov
          pip install -e .

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=cobuilder --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docs-lint:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate skill documentation
        run: |
          python .claude/scripts/doc-gardener/lint.py || echo "Doc linter warnings (non-blocking)"

      - name: Check frontmatter in markdown files
        run: |
          python .claude/scripts/doc-gardener/gardener.py --report || true

  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for exposed secrets
        run: |
          # Check that .env files are not committed
          if git ls-files | grep -q '\.env$'; then
            echo "ERROR: .env file found in git tracking!"
            exit 1
          fi

          # Check for API key patterns
          if grep -r "sk-[a-zA-Z0-9]\{20,\}" --include="*.py" --include="*.json" --include="*.yaml" --include="*.md" . 2>/dev/null; then
            echo "ERROR: Potential API key found in tracked files!"
            exit 1
          fi

          echo "No secrets detected in repository"

      - name: Verify .gitignore patterns
        run: |
          # Ensure critical files are ignored
          git check-ignore -q cobuilder/engine/.env 2>/dev/null || echo "WARNING: cobuilder/engine/.env not in .gitignore"
          git check-ignore -q .pipelines/ 2>/dev/null || echo "WARNING: .pipelines/ not in .gitignore"
          git check-ignore -q .mcp.json 2>/dev/null || echo "WARNING: .mcp.json not in .gitignore"