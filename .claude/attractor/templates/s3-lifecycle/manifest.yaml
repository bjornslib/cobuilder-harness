template:
  name: s3-lifecycle
  version: "1.0"
  description: >
    Self-driving System 3 lifecycle: research -> refine -> plan ->
    execute -> validate -> deploy -> evaluate -> loop
  topology: cyclic
  min_nodes: 9
  max_nodes: 15

parameters:
  prd_ref:
    type: string
    required: true
    description: "PRD identifier (e.g., PRD-AUTH-001)"
  prd_path:
    type: string
    required: true
    description: "Path to the PRD markdown file"
  target_repo:
    type: string
    required: true
    description: "Path to the target repository"
  max_cycles:
    type: integer
    required: false
    default: 3
    description: "Maximum full research-to-evaluate cycles before forced exit"
  execution_template:
    type: string
    required: false
    default: "hub-spoke"
    description: "Template to use for child pipelines generated by PLAN"
  deploy_command:
    type: string
    required: false
    default: ""
    description: "Deployment command (empty = skip deploy)"
  model_research:
    type: string
    required: false
    default: "haiku"
    description: "Model for research node"
  model_refine:
    type: string
    required: false
    default: "opus"
    description: "Model for refinement node"
  model_plan:
    type: string
    required: false
    default: "opus"
    description: "Model for planning node"

constraints:
  lifecycle_transitions:
    description: "Allowed status transitions for lifecycle LLM nodes"
    type: node_state_machine
    applies_to:
      shape: box
    states: [pending, active, completed, failed]
    transitions:
      - {from: pending, to: active}
      - {from: active, to: completed}
      - {from: active, to: failed}
      - {from: failed, to: active}
    initial: pending
    terminal: [completed, failed]

  bounded_lifecycle:
    description: "Limit total cycles to prevent runaway loops"
    type: loop_constraint
    rule:
      max_per_node_visits: 4
      max_pipeline_visits: 35

  must_validate_before_deploy:
    description: "Execute must pass through validate before reaching deploy"
    type: path_constraint
    rule:
      from_shape: house
      must_pass_through:
        - hexagon
      before_reaching:
        - parallelogram
