# providers.yaml — LLM profile definitions for CoBuilder
#
# This file defines named LLM profiles that DOT nodes can reference via the
# `llm_profile` attribute. Profile keys translate to Anthropic SDK equivalents
# at dispatch time.
#
# Resolution order (first non-null wins):
# 1. Node's llm_profile attribute → look up in this file
# 2. handler_defaults.{handler_type}.llm_profile from manifest
# 3. defaults.llm_profile from manifest
# 4. Environment variables (ANTHROPIC_MODEL, ANTHROPIC_API_KEY, ANTHROPIC_BASE_URL)
# 5. Runner defaults (hardcoded)
#
# Usage in DOT:
#   codergen_auth [
#       shape=box
#       handler="codergen"
#       llm_profile="anthropic-smart"
#       prompt="Implement authentication..."
#   ];

# Default profile — used when no llm_profile is set on a node and no
# handler_defaults or manifest defaults override it. Layer 5 fallback.
default_profile: alibaba-glm5

profiles:
  # Anthropic Haiku — fast, cheap, good for research and summarization
  anthropic-fast:
    model: claude-haiku-4-5-20251001
    api_key: $ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com

  # Anthropic Sonnet — balanced, good for implementation
  anthropic-smart:
    model: claude-sonnet-4-5-20250514
    api_key: $ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com

  # Anthropic Opus — most capable, good for complex reasoning
  anthropic-opus:
    model: claude-opus-4-6
    api_key: $ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com

  # Alibaba Cloud DashScope — GLM-5 and Qwen3 models via Anthropic-compatible API
  alibaba-glm5:
    model: glm-5
    api_key: $DASHSCOPE_API_KEY
    base_url: https://coding-intl.dashscope.aliyuncs.com/apps/anthropic

  alibaba-qwen3:
    model: qwen3-coder-plus
    api_key: $DASHSCOPE_API_KEY
    base_url: https://coding-intl.dashscope.aliyuncs.com/apps/anthropic

  # OpenRouter — any model available on openrouter.ai
  # Set OPENROUTER_API_KEY in cobuilder/engine/.env to use
  openrouter-haiku:
    model: anthropic/claude-haiku-4-5-20251001
    api_key: $OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1

  openrouter-sonnet:
    model: anthropic/claude-sonnet-4-5-20250514
    api_key: $OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1

  openrouter-minimax:
    model: minimax/minimax-m1-80k
    api_key: $OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1

  # MiniMax direct API — set MINIMAX_API_KEY in cobuilder/engine/.env
  minimax-direct:
    model: MiniMax-M1-80k
    api_key: $MINIMAX_API_KEY
    base_url: https://api.minimax.chat/v1

  # Anthropic Haiku via direct API (same as anthropic-fast, explicit alias)
  haiku-45:
    model: claude-haiku-4-5-20251001
    api_key: $ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com